<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>맛집 매칭 테스트 (Restaurant Matchmaker)</title>
    <link rel="stylesheet" href="style.css?v=7">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- 헤더 -->
        <header class="app-header">
            <div class="logo">🍜</div>
            <h1>맛집 추천</h1>
            <p class="subtitle">나의 완벽한 입맛 파악</p>
        </header>

        <!-- 메인 콘텐츠 영역 -->
        <main class="app-content">
            <!-- 1단계: 테마 선택 화면 -->
            <section id="theme-view" class="view active">
                <h2 class="section-title">오늘 끌리는 테마를 선택하세요</h2>
                <div id="theme-list" class="grid-container">
                    <div class="loading">테마 목록을 불러오는 중...</div>
                </div>
            </section>

            <!-- 2단계: 질문 진행 화면 -->
            <section id="quiz-view" class="view">
                <div class="quiz-progress-bar">
                    <div id="progress-indicator" class="progress-fill" style="width: 0%"></div>
                </div>
                <div class="question-container">
                    <span id="question-id-badge" class="badge">Question</span>
                    <h2 id="question-text" class="question-title">질문 텍스트가 표시됩니다.</h2>
                    <div id="options-list" class="options-container">
                        <!-- 옵션 버튼들이 동적으로 추가됩니다 -->
                    </div>
                    <div id="text-input-container" class="text-input-container" style="display: none;">
                        <input type="text" id="keyword-input" placeholder="여기에 입력하세요..." class="keyword-input" autocomplete="off">
                        <button id="btn-search" class="btn btn-primary btn-search">검색</button>
                    </div>
                </div>
                <div class="quiz-footer">
                    <button id="btn-back-question" class="btn btn-secondary" style="display: none;">이전 질문</button>
                    <button id="btn-back-to-themes" class="btn btn-secondary">처음으로</button>
                </div>
            </section>

            <!-- 3단계: 결과 조회 화면 -->
            <section id="result-view" class="view">
                <div class="result-header">
                    <div class="success-icon">✨</div>
                    <h2 id="main-result-title" class="result-title">당신의 취향 분석 완료!</h2>
                    <div class="tags-container">
                        <span class="tags-label">획득한 태그:</span>
                        <div id="accumulated-tags" class="tag-pills">
                            <!-- 누적된 태그가 들어갑니다 -->
                        </div>
                    </div>
                </div>

                <div class="shops-section">
                    <h3 id="shops-title" class="shops-title">당신에게 매칭된 라멘 샵 추천</h3>
                    <div id="shops-list" class="shops-container">
                        <div class="loading">추천 맛집을 매칭 중...</div>
                    </div>
                </div>

                <div class="result-footer">
                    <button id="btn-retry" class="btn btn-primary">다시 테스트하기</button>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js?v=7"></script>
</body>
</html>
